name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run verify and package app image
        shell: pwsh
        run: ./scripts/package-win.ps1

      - name: Archive app image
        shell: pwsh
        run: |
          if (Test-Path release) { Remove-Item -Recurse -Force release }
          New-Item -ItemType Directory -Path release | Out-Null
          Compress-Archive -Path dist/MiniJuego2D/* -DestinationPath release/MiniJuego2D-${{ github.ref_name }}-win64.zip -Force

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/MiniJuego2D-${{ github.ref_name }}-win64.zip
